<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strój szkolny</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Strój szkolny</h1>
        <p>Witamy na stronie poświęconej strojowi ucznia i nauczyciela.</p>
    </header>

    <main>
        <section class="opis">
            <p>
                Strój szkolny powinien być schludny, wygodny oraz odpowiedni do miejsca nauki.
                Poniżej znajdują się grafiki przedstawiające ucznia oraz nauczyciela.
            </p>
        </section>

        <section class="galeria">

            <div class="karta">
                <h2>Uczeń</h2>
                <img src="uczen.png" alt="Uczeń">
            </div>

            <div class="karta">
                <h2>Nauczyciel</h2>
                <img src="nauczyciel.png" alt="Nauczyciel">
            </div>

        </section>
    </main>

    <footer>
        Stronę przygotował: Dawid Biegański, klasa 4D
    </footer>

</body>
</html>
